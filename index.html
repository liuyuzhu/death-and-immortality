<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#2d3748;padding:20px}
.container{max-width:800px;margin:0 auto}
h1{text-align:center;padding:40px 20px;font-size:28px;color:#1a365d}
.report-list{list-style:none;padding:0}
.report-card{background:#fff;border-radius:10px;padding:20px;margin:12px 0;box-shadow:0 2px 8px rgba(0,0,0,0.08);transition:transform .2s;display:flex;justify-content:space-between;align-items:center}
.report-card:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(0,0,0,0.12)}
.report-name{font-size:16px;font-weight:600;color:#2d3748}
.report-time{font-size:13px;color:#a0aec0;margin-top:4px}
.report-link{background:#667eea;color:white;padding:8px 20px;border-radius:20px;text-decoration:none;font-size:14px;font-weight:600;transition:background .2s}
.report-link:hover{background:#5a6fd6}
.footer{text-align:center;padding:30px;color:#a0aec0;font-size:13px}
</style></head>
<body>
<div class="container">
<h1>📊 报告中心</h1>

    </div>
